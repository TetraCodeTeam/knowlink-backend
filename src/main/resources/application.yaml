spring:
  application:
    name: knowlink

  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?createDatabaseIfNotExist=true&serverTimezone=UTC
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: ${DDL_AUTO}
    show-sql: true
    open-in-view: false

  main:
    allow-bean-definition-overriding: true

  servlet:
    multipart:
      max-file-size: 8MB
      max-request-size: 40MB

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=10m

  profiles:
    active: ${SPRING_PROFILE:development}

  data:
    web:
      pageable:
        one-indexed-parameters: false
      rest:
        page-parameter-name: page
        size-parameter-name: size
        sort-parameter-name: sort

frontend:
  url: ${FRONTEND_URL}

app:
  url: ${APP_URL}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  show-actuator: false

logging:
  level:
    org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer: ERROR
    com.knowlink.api: INFO
