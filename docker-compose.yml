services:
  mysql:
    image: mysql:8.0
    container_name: knowlink-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-knowlink_db}
      MYSQL_USER: ${DB_USER:-knowlink_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-knowlink_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build: .
    container_name: knowlink-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    env_file: .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      SPRING_PROFILE: development
      DDL_AUTO: update

volumes:
  mysql_data:
